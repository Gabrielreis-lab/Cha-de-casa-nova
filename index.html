                    if (icon) setIconNode(icon);

            return (
                <svg
                    {...props}
                    width={props.size || 24}
                    height={props.size || 24}
                    fill={props.fill || "none"}
                    stroke={props.stroke || "currentColor"}
                    strokeWidth={props.strokeWidth || 2}
                    strokeLinecap="round"
                    strokeLinejoin="round"
                    dangerouslySetInnerHTML={{ __html: iconNode.map(i => `<${i[0]} ${Object.entries(i[1]).map(([k,v]) => `${k}="${v}"`).join(' ')} />`).join('') }}

            const [activeTab, setActiveTab] = useState('home');
            const [gifts, setGifts] = useState(INITIAL_GIFTS_DATA);
            const [sortOrder, setSortOrder] = useState('default');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedGift, setSelectedGift] = useState(null);
            const [gifterName, setGifterName] = useState('');
            const [user, setUser] = useState(null);
            const [isSyncing, setIsSyncing] = useState(true);
            const [message, setMessage] = useState({ show: false, text: '', type: 'success' });
            const [rsvpForm, setRsvpForm] = useState({ name: '', companions: 0, status: 'yes' });
            const contentRef = useRef(null);

            // --- FIREBASE: SINCRONIZAÇÃO EM TEMPO REAL ---
            useEffect(() => {
                const initFirebase = async () => {
                    try {
                        const cred = await auth.signInAnonymously();
                        setUser(cred.user);

                        const claimsRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('presentes_v2');
                        
                        const unsubscribe = claimsRef.onSnapshot((snapshot) => {
                            const claims = {};
                            snapshot.forEach(doc => { 
                                claims[doc.id] = doc.data().claimedBy; 
                            });
                            
                            setGifts(prev => prev.map(item => ({
                                ...item,
                                claimedBy: claims[item.id] || null
                            })));
                            setIsSyncing(false);
                        }, (err) => {
                            console.error("Erro Firestore:", err);
                        });

                        return () => unsubscribe();
                    } catch (e) {
                        console.error("Erro ao iniciar Firebase:", e);
                    }
                };

                initFirebase();
            }, []);

            const sortedGifts = useMemo(() => {
                let filtered = gifts.filter(g => g.name.toLowerCase().includes(searchQuery.toLowerCase()));
                if (sortOrder === 'price-asc') return [...filtered].sort((a, b) => a.price - b.price);
                if (sortOrder === 'price-desc') return [...filtered].sort((a, b) => b.price - a.price);
                return filtered;
            }, [gifts, sortOrder, searchQuery]);

            const showMessage = (text, type = 'success') => {
                setMessage({ show: true, text, type });
                setTimeout(() => setMessage({ show: false, text: '', type: 'success' }), 5000);
            };

            const handleNavigateAndScroll = (tab) => {
                setActiveTab(tab);
                contentRef.current?.scrollIntoView({ behavior: 'smooth' });
            };

                e.preventDefault();
                if (!gifterName.trim()) return showMessage('Por favor, informe o seu nome.', 'error');
                if (!user) return showMessage('Aguardando conexão com o servidor...', 'error');

                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('presentes_v2')

                            claimedBy: gifterName, 
                            timestamp: firebase.firestore.FieldValue.serverTimestamp() 
                        });

                    fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            _subject: "🎁 Novo Presente Selecionado!",
                            Convidado: gifterName,
                            Item: selectedGift.name,
                            Valor: selectedGift.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })
                        })
                    });

                    const link = selectedGift.link;
                    setSelectedGift(null);
                    setGifterName('');
                    
                    if (link) {
                        showMessage('Muito obrigado! Abrindo a loja... ❤️');
                        setTimeout(() => window.open(link, '_blank'), 1500);
                    } else {
                        showMessage('Escolha salva com sucesso! ❤️');
                    }
                } catch (error) {
                    console.error("Erro ao gravar:", error);
                    showMessage('Erro ao salvar. Tente novamente.', 'error');
                }
            };

                e.preventDefault();
                if (!rsvpForm.name.trim()) return showMessage('Informe o seu nome.', 'error');

                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('rsvp')

                    fetch(`https://formspree.io/f/${FORMSPREE_ID}`, {

                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            _subject: "✅ Confirmação de Presença!",

                        </div>
                    </header>

                                </div>
                                
                                {isSyncing ? (
                                    <div className="py-20 text-center"><p className="animate-pulse text-[#8a9289]">Sincronizando com a nuvem...</p></div>
                                ) : (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8 px-4 text-center">
                                        {sortedGifts.map(gift => (
                                            <div key={gift.id} className={`bg-white rounded-3xl shadow-sm border p-8 flex flex-col items-center text-center transition-all ${gift.claimedBy ? 'opacity-60 bg-[#f9f9f9]' : 'hover:shadow-md hover:-translate-y-1'}`}>
                                                <div className="w-14 h-14 bg-[#f4f2eb] rounded-full flex items-center justify-center mb-6">
                                                    <Icon name={gift.icon} size={24} stroke="#283c31" strokeWidth={1.5} />
                                                </div>
                                                <h3 className="font-semibold text-[#283c31] mb-2 min-h-[48px] flex items-center justify-center text-center">{gift.name}</h3>
                                                <p className="text-[#8a9289] font-serif text-lg mb-6">
                                                    {gift.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
                                                </p>
                                                <div className="mt-auto w-full">
                                                    {gift.claimedBy ? (
                                                        <div className="text-[10px] font-bold text-[#8a9289] bg-[#f4f2eb] py-3 rounded-xl flex items-center justify-center gap-2 uppercase tracking-wide border border-[#e6e2d6] text-center">
                                                            <Icon name="Check" size={14} stroke="#a5aba6" /> Oferecido por {gift.claimedBy}
                                                        </div>
                                                    ) : (
                                                        <button onClick={() => setSelectedGift(gift)} className="w-full bg-[#283c31] text-white text-[10px] font-bold py-3.5 rounded-xl hover:bg-[#1a2720] transition-colors flex items-center justify-center gap-2 uppercase tracking-widest shadow-sm">
                                                            <Icon name="Gift" size={14} stroke="white" />
                                                            Presentear
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}

                                <div className="mt-20 text-center bg-white rounded-[2.5rem] p-12 border border-[#e6e2d6] shadow-sm max-w-3xl mx-auto mx-4 text-center">
                                    <p className="uppercase tracking-[0.1em] text-[10px] text-[#8a9289] mb-4 font-bold text-center">Para quem quiser contribuir de outra maneira:</p>
                                    <h3 className="text-3xl font-serif text-[#283c31] mb-8 text-center">Presente em dinheiro</h3>
                                    <div className="flex flex-col sm:flex-row gap-4 justify-center items-center">
                                        <button onClick={handleCopyPix} className="w-full sm:flex-1 flex items-center justify-center gap-3 border-2 border-[#283c31] text-[#283c31] py-4 rounded-2xl hover:bg-[#f4f2eb] transition-all font-bold uppercase tracking-widest text-xs text-balance">
                                            <Icon name="Copy" size={18} /> Copiar Chave PIX
                                        </button>
                                        <a href="https://link.mercadopago.com.br/chadecasanovalg" target="_blank" className="w-full sm:flex-1 flex items-center justify-center gap-3 bg-[#283c31] text-white py-4 rounded-2xl hover:bg-[#1a2720] transition-all font-bold uppercase tracking-widest text-xs shadow-md">
                                            <Icon name="CreditCard" size={18} /> Cartão de Crédito
                                        </a>
                                    </div>
                                    <p className="text-[10px] text-[#a5aba6] mt-8 uppercase tracking-widest text-center">Chave PIX: 071.750.771-81 • Laura e Gabriel</p>
                                </div>
                            </div>
                        )}

                        {/* CONTEÚDO: RSVP */}
                        {activeTab === 'rsvp' && (
                            <div className="max-w-xl mx-auto fade-in px-4">
                                <div className="bg-white rounded-3xl shadow-sm border border-[#e6e2d6] p-8 md:p-12">
                                    <h2 className="text-3xl font-serif mb-2 uppercase tracking-wide text-center">Confirmar Presença</h2>
                                    <p className="text-[#6e7771] font-light text-center mb-10 text-balance">Sua presença é importante nessa data</p>
                                    <form onSubmit={handleRsvpSubmit} className="space-y-6">
                                        <div>
                                            <label className="block text-[10px] font-bold text-[#283c31] uppercase tracking-widest mb-3 text-left">Nome Completo</label>
                                            <input type="text" required value={rsvpForm.name} onChange={(e)=>setRsvpForm({...rsvpForm, name: e.target.value})} className="w-full px-5 py-4 rounded-2xl border border-[#e6e2d6] focus:ring-1 focus:ring-[#283c31] outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] font-bold text-[#283c31] uppercase tracking-widest mb-3 text-left">Você comparecerá?</label>
                                            <div className="grid grid-cols-2 gap-4">
                                                <button type="button" onClick={()=>setRsvpForm({...rsvpForm, status: 'yes'})} className={`py-4 rounded-2xl border text-sm font-bold transition-all ${rsvpForm.status === 'yes' ? 'bg-[#283c31] text-white border-[#283c31]' : 'border-[#e6e2d6] text-[#8a9289]'}`}>Sim</button>
                                                <button type="button" onClick={()=>setRsvpForm({...rsvpForm, status: 'no'})} className={`py-4 rounded-2xl border text-sm font-bold transition-all ${rsvpForm.status === 'no' ? 'bg-[#8a9289] text-white border-[#8a9289]' : 'border-[#e6e2d6] text-[#8a9289]'}`}>Não poderei</button>
                                            </div>
                                        </div>
                                        {rsvpForm.status === 'yes' && (
                                            <div className="fade-in">
                                                <label className="block text-[10px] font-bold text-[#283c31] uppercase tracking-widest mb-3 text-left">Nº de Acompanhantes</label>
                                                <input type="number" min="0" value={rsvpForm.companions} onChange={(e)=>setRsvpForm({...rsvpForm, companions: e.target.value})} className="w-full px-5 py-4 rounded-2xl border border-[#e6e2d6] focus:ring-1 focus:ring-[#283c31] outline-none" />
                                            </div>
                                        )}
                                        <button type="submit" className="w-full bg-[#283c31] text-white py-5 rounded-2xl font-bold uppercase tracking-widest text-xs shadow-md">Confirmar Presença</button>
                                    </form>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Modal de Ação para Presente */}
                    {selectedGift && (
                        <div className="fixed inset-0 bg-black/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 fade-in">
                            <div className="bg-white rounded-[2.5rem] p-8 md:p-12 max-w-md w-full shadow-2xl">
                                <h3 className="text-2xl font-serif text-[#283c31] text-center mb-2 uppercase tracking-wide">Presentear</h3>
                                <p className="text-[#6e7771] text-center text-sm mb-8 px-4 text-balance">Você está escolhendo o item: <br/><strong>{selectedGift.name}</strong></p>
                                
                                <div className="bg-[#f9f8f4] border border-[#e6e2d6] rounded-3xl p-6 mb-8 text-center flex flex-col items-center">
                                    <p className="text-[10px] text-[#8a9289] uppercase tracking-widest mb-1 font-bold text-center">Valor Sugerido</p>
                                    <p className="text-3xl font-serif text-[#283c31] mb-8 text-center">{selectedGift.price.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}</p>
                                    
                                    {selectedGift.isCashFund ? (
                                        <div className="space-y-3 w-full text-left">
                                            <button onClick={handleCopyPix} className="w-full flex items-center justify-between bg-white p-4 rounded-2xl border border-[#e6e2d6] hover:border-[#283c31] transition-colors group">
                                                <div className="flex items-center gap-3">
                                                    <Icon name="QrCode" size={20} stroke="#283c31" />
                                                    <span className="text-xs font-bold text-[#283c31] uppercase tracking-wider text-balance">Copiar Chave PIX</span>
                                                </div>
                                                <Icon name="Copy" size={18} stroke="#a5aba6" />
                                            </button>
                                            <a href="https://link.mercadopago.com.br/chadecasanovalg" target="_blank" className="w-full flex items-center justify-between bg-[#283c31] p-4 rounded-2xl text-white hover:bg-[#1a2720] transition-colors">
                                                <div className="flex items-center gap-3">
                                                    <Icon name="Heart" size={20} fill="white" stroke="none" />
                                                    <span className="text-xs font-bold uppercase tracking-wider">Pagar com Cartão</span>
                                                </div>
                                                <Icon name="ExternalLink" size={18} stroke="rgba(255,255,255,0.5)" />
                                            </a>
                                        </div>
                                    ) : (
                                        <div className="p-4 text-xs text-[#283c31] bg-white rounded-2xl border border-[#e6e2d6] font-medium leading-relaxed italic text-center text-balance">
                                            Ao confirmar, o item ficará reservado no seu nome para que ninguém mais o possa escolher! ❤️
                                        </div>
                                    )}
                                </div>

                                <form onSubmit={handleClaimGift} className="space-y-6">
                                    <div>
                                        <label className="block text-[10px] font-bold text-[#283c31] uppercase tracking-widest mb-3 text-left">Seu nome para agradecermos</label>
                                        <input type="text" required value={gifterName} onChange={(e)=>setGifterName(e.target.value)} className="w-full px-5 py-4 rounded-2xl border border-[#e6e2d6] focus:ring-1 focus:ring-[#283c31] outline-none" placeholder="Ex: Maria Silva" />
                                    </div>
                                    <div className="flex gap-4">
                                        <button type="button" onClick={()=>setSelectedGift(null)} className="flex-1 py-4 text-xs font-bold text-[#8a9289] uppercase tracking-widest">Cancelar</button>
                                        <button type="submit" className="flex-1 bg-[#283c31] text-white py-4 rounded-2xl font-bold text-xs uppercase tracking-widest shadow-md">Confirmar</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Navegação Mobile */}
                    <div className="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-[#e6e2d6] flex justify-around p-3 z-40 pb-safe shadow-lg text-center">
                        <button onClick={()=>handleNavigateAndScroll('home')} className={`flex flex-col items-center gap-1 ${activeTab==='home'?'text-[#283c31]':'text-[#a5aba6]'}`}>
                            <Icon name="Home" size={20} /><span className="text-[10px] font-bold uppercase tracking-tighter">Evento</span>
                        </button>
                        <button onClick={()=>handleNavigateAndScroll('gifts')} className={`flex flex-col items-center gap-1 ${activeTab==='gifts'?'text-[#283c31]':'text-[#a5aba6]'}`}>
                            <Icon name="Gift" size={20} /><span className="text-[10px] font-bold uppercase tracking-tighter">Presentes</span>
                        </button>
                        <button onClick={()=>handleNavigateAndScroll('rsvp')} className={`flex flex-col items-center gap-1 ${activeTab==='rsvp'?'text-[#283c31]':'text-[#a5aba6]'}`}>
                            <Icon name="Users" size={20} /><span className="text-[10px] font-bold uppercase tracking-tighter">Presença</span>
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
